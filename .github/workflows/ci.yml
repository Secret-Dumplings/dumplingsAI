name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint & Build (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync

      - name: Compile check (py_compile)
        run: |
          uv run python -m compileall -q .

      - name: Import smoke test
        run: |
          uv run python -c "import dumplingsAI as p; assert p.BaseAgent and p.register_agent and p.tool_registry; print('import OK', p.__version__)"

      - name: Lint with ruff
        run: |
          uv pip install --upgrade ruff
          uv run ruff check . || true

  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Build distributions
        run: |
          uv pip install --upgrade build
          uv run python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/